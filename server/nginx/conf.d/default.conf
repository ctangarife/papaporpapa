# ==============================================================================
# PAPAS APP - Nginx Site Configuration
# ==============================================================================

# Main server
server {
    listen 80;
    server_name _;

    # Favicon y robots.txt
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        return 204;
    }
    location = /robots.txt {
        access_log off;
        log_not_found off;
        return 200 "User-agent: *\nDisallow:\n";
        add_header Content-Type text/plain;
    }

    # API NestJS - Usuario, Login, Perfil, Tareas, Health
    location /api/ {
        # /api/llm/ es la excepción, va a FastAPI
        rewrite ^/api/llm/(.*)$ /llm/$1 break;
        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass http://nestjs_api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # API FastAPI - Modelos LLM (excepción que maneja /llm/)
    location /api/llm/ {
        rewrite ^/api/llm/(.*)$ /llm/$1 break;

        proxy_pass http://python_llm:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # LLMs pueden tardar más
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Assets estáticos con cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html/frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri = /index.html;
    }

    # Frontend - Vue.js Dashboard
    location / {
        root /usr/share/nginx/html/frontend;
        try_files $uri $uri/ /index.html;
    }
}
