# ==============================================================================
# PAPAS APP - Task Management App
# Docker Compose Orchestration
# ==============================================================================

services:
  # ---------------------------------------------------------------------------
  # POSTGRESQL - Base de datos
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: papas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      papas-network:
        aliases:
          - db

  # ---------------------------------------------------------------------------
  # BACKEND NESTJS - Usuario, Login, Perfil, Tareas
  # ---------------------------------------------------------------------------
  backend-nestjs:
    build:
      context: .
      dockerfile: build/backend-nestjs/Dockerfile
    container_name: papas-backend-nestjs
    restart: unless-stopped
    environment:
      # Database (usando alias de red)
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: ${POSTGRES_DB}
      # JWT Config
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      # API Config
      API_PORT: ${NESTJS_API_PORT:-3001}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      # LLM Backend URL (usando alias de red)
      LLM_BACKEND_URL: http://python_llm:8000
    ports:
      - "${NESTJS_API_PORT:-3001}:3001"
    volumes:
      # Código fuente para hot-reload en desarrollo
      - ./data/backend-nestjs:/app
      # Volumen anónimo para node_modules (evita conflicto con host)
      - /app/node_modules
    command: sh -c "npm install --prefer-offline --no-audit --no-fund && npm run start:dev"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      papas-network:
        aliases:
          - nestjs_api

  # ---------------------------------------------------------------------------
  # BACKEND FASTAPI - Modelos LLM (Ollama, z.ai, MiniMax)
  # ---------------------------------------------------------------------------
  backend-fastapi:
    build:
      context: .
      dockerfile: build/backend-fastapi/Dockerfile
    container_name: papas-backend-fastapi
    restart: unless-stopped
    environment:
      # API Config
      API_PORT: ${FASTAPI_PORT:-8000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    ports:
      - "${FASTAPI_PORT:-8000}:8000"
    volumes:
      # Código fuente para hot-reload en desarrollo
      - ./data/backend-fastapi:/app
      # Volumen anónimo para dependencias Python (evita conflicto con host)
      - /app/.venv
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      papas-network:
        aliases:
          - python_llm

  # ---------------------------------------------------------------------------
  # FRONTEND - Vue.js Dashboard
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: build/frontend/Dockerfile
    container_name: papas-frontend
    volumes:
      # Código fuente
      - ./data/frontend:/app
      # Archivos estáticos compilados (para nginx)
      - ./data/static:/app/dist
    environment:
      # API URLs (desde nginx)
      VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost}
    command: sh -c "npm install && NODE_ENV=production npm run build --max-old-space-size=4096"
    networks:
      - papas-network

  # ---------------------------------------------------------------------------
  # NGINX - Reverse Proxy + Static file server
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: papas-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HOST_PORT:-80}:80"
      - "${NGINX_HEALTH_PORT:-8080}:8080"
    volumes:
      # Configuración de nginx
      - ./server/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./server/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./server/nginx/includes:/etc/nginx/includes:ro
      # Archivos estáticos del frontend
      - ./data/static:/usr/share/nginx/html/frontend:rw
    depends_on:
      - backend-nestjs
      - backend-fastapi
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - papas-network

# ---------------------------------------------------------------------------
# VOLUMES - Datos persistentes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local

# ---------------------------------------------------------------------------
# NETWORKS - Redes Docker
# ---------------------------------------------------------------------------
networks:
  papas-network:
    driver: bridge
